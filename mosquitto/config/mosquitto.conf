# =============================================================================
# mosquitto.conf  --  configuration for the MQTT broker
# =============================================================================
# By default the Mosquitto image only listens on localhost INSIDE its own
# container, which would make it unreachable. This config opens a normal
# network listener so the backend and devices can connect.

# Listen for MQTT connections on the standard port, on all interfaces
# (0.0.0.0) so other containers on the compose network can reach it.
listener 1883 0.0.0.0

# ---- AUTHENTICATION -------------------------------------------------------
# For this DEMO we allow anonymous connections to keep things simple.
#
# WHERE TENANT ISOLATION IS ENFORCED TODAY: at the BACKEND, not here. The
# dashboard only ever talks to the backend's REST/WebSocket API, which requires
# an API key and scopes every query to that key's tenant (see backend/src/
# auth.js + db.js). The broker stays internal (not exposed to the internet in
# the cloud deploy), so anonymous access on the private compose network is fine
# for the demo.
#
# IN PRODUCTION you would harden the broker too. The portable, cloud-neutral
# way is X.509 client certificates over mutual TLS (mTLS): every device carries
# its own cert, and broker ACLs restrict each device to its own tenant's topic
# prefix (tenants/{tenant}/...). That works identically on AWS, Azure, on-prem.
# Crucially, the topic design already namespaces by tenant, so adding broker
# ACLs later is a config change -- no application code changes.
allow_anonymous true

# ---- PERSISTENCE ----------------------------------------------------------
# Keep "retained" messages and subscriptions across broker restarts. Retained
# messages matter here: a device publishes its status/state as "retained" so
# that whenever the backend (re)connects, the broker immediately replays the
# last known value instead of leaving us blind until the next update.
persistence true
persistence_location /mosquitto/data/
