# =============================================================================
# mosquitto.conf  --  configuration for the MQTT broker
# =============================================================================
# By default the Mosquitto image only listens on localhost INSIDE its own
# container, which would make it unreachable. This config opens a normal
# network listener so the backend and devices can connect.

# Listen for MQTT connections on the standard port, on all interfaces
# (0.0.0.0) so other containers on the compose network can reach it.
listener 1883 0.0.0.0

# ---- AUTHENTICATION -------------------------------------------------------
# For this DEMO we allow anonymous connections to keep things simple. This is a
# single-instance deployment (one customer per stack) and the broker stays
# internal -- it is not exposed to the internet in the cloud deploy, so the
# only things talking to it are the backend and the devices on the private
# compose network.
#
# IN PRODUCTION you would still harden the broker. The portable, cloud-neutral
# way is X.509 client certificates over mutual TLS (mTLS): every device carries
# its own cert and the broker verifies it. That works identically on AWS,
# Azure, and on-prem, and is a config change here -- no application code changes.
allow_anonymous true

# ---- PERSISTENCE ----------------------------------------------------------
# Keep "retained" messages and subscriptions across broker restarts. Retained
# messages matter here: a device publishes its status/state as "retained" so
# that whenever the backend (re)connects, the broker immediately replays the
# last known value instead of leaving us blind until the next update.
persistence true
persistence_location /mosquitto/data/
